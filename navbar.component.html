<nav class="navbar">
  <div class="nav-inner">

    <div class="nav-left">
      <img
        src="https://res.cloudinary.com/dlsr1ex0d/image/upload/v1772573282/cryptara_bdtjoj.jpg"
        alt="Cryptara"
        class="nav-logo"
      />
      <div class="nav-links">
        <a routerLink="/dashboard" class="active">Dashboard</a>
        <a href="#">Markets</a>
        <a href="#">Portfolio</a>
        <a href="#">History</a>
      </div>
    </div>

    <div class="nav-right">
      <div class="balance-pill">
        <span class="balance-label">Balance</span>
        <span class="balance-val">${{ balance | number:'1.2-2' }}</span>
      </div>

      <div class="user-menu">
        <div class="avatar">
          <img *ngIf="user?.avatar" [src]="user.avatar" [alt]="user?.username"/>
          <span *ngIf="!user?.avatar">{{ user?.username?.charAt(0)?.toUpperCase() }}</span>
        </div>
        <span class="username">{{ user?.username }}</span>
        <button class="logout-btn" (click)="logout()">
          <svg width="15" height="15" viewBox="0 0 15 15" fill="none">
            <path d="M6 2H3a1 1 0 00-1 1v9a1 1 0 001 1h3M10 10l3-3-3-3M13 7H6" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </button>
      </div>
    </div>

  </div>
</nav>
